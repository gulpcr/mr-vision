upstream backend_api {
    server backend:8000;
}

upstream orthanc_server {
    server orthanc:8042;
}

upstream frontend_app {
    server ui:3000;
}

upstream ohif_viewer {
    server ohif:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 2G;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Frontend
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint (F16)
    location /ws {
        proxy_pass http://backend_api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # OHIF Viewer (F17)
    # OHIF v3 is built with PUBLIC_URL='/' — all static assets use absolute paths
    # like /app.bundle.xxx.js which nginx would otherwise route to Next.js.
    # sub_filter rewrites the HTML response so the browser requests them via
    # /ohif/* which this block proxies to the OHIF container.
    location /ohif/ {
        proxy_pass http://ohif_viewer/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable upstream gzip so sub_filter can operate on the raw text
        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter 'src="/'  'src="/ohif/';
        sub_filter 'href="/' 'href="/ohif/';
    }

    # Health check
    location /health {
        proxy_pass http://backend_api/health;
    }

    # Orthanc (includes Stone Web Viewer at /stone-webviewer/)
    location /orthanc/ {
        proxy_pass http://orthanc_server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /dicom-web/ {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-API-Key" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://orthanc_server/dicom-web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /wado {
        add_header Access-Control-Allow-Origin $http_origin always;

        proxy_pass http://orthanc_server/wado;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
