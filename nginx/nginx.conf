upstream backend_api {
    server backend:8000;
}

upstream orthanc_server {
    server orthanc:8042;
}

upstream frontend_app {
    server ui:3000;
}

upstream ohif_viewer {
    server ohif:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 2G;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Frontend
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Next.js HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # OHIF assets requested at the document root (F17).
    # OHIF is built with webpack publicPath="/", so its lazy JS/CSS chunks, the
    # WASM, web-worker bundles and fonts are fetched at the root: /<n>.bundle.<h>.js,
    # /<n>.css, /<hash>.wasm, /<hash>.woff2, /assets/... The /ohif/ block also serves
    # a rewritten copy under /ohif/, but a browser running a bundle whose publicPath
    # is "/" (e.g. one cached before the rewrite, or any future build) requests these
    # at the root. Serve them from the OHIF container so the viewer loads regardless
    # of which publicPath the running bundle has — no cache-clearing required.
    # Safe against the Next.js frontend (served at "/"): its assets live under
    # /_next/ (multi-segment) and ui/public ships no root-level js/css/wasm/font
    # files, so these single-segment patterns never shadow a frontend asset.
    location ~* ^/[^/]+\.(?:js|css|wasm|woff2?|ttf|map)$ {
        proxy_pass http://ohif_viewer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ^~ /assets/ {
        proxy_pass http://ohif_viewer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint (F16)
    location /ws {
        proxy_pass http://backend_api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # OHIF Viewer (F17)
    # OHIF v3 is built with PUBLIC_URL='/' and webpack publicPath="/", so every
    # asset path is rooted at "/". Served behind this /ohif/ subpath, two classes
    # of request would otherwise break and leave the viewer blank/black:
    #   1. Static tags in index.html (<script src="/app.bundle.js">, <link href>)
    #      — fixed by the src=/href= rewrites below.
    #   2. Runtime requests the JS makes for lazy chunks, the WASM, and web
    #      workers, built from window.PUBLIC_URL and the baked webpack publicPath
    #      (__webpack_require__.p). These are NOT in the HTML, so rewriting the
    #      HTML alone is not enough — they must be rewritten in the JS responses
    #      too, otherwise the browser fetches /<chunk>.js from "/" (the Next.js
    #      frontend → 404) and the viewer never finishes loading.
    # sub_filter_types adds application/javascript to the default text/html so the
    # JS bundles are also processed. The bundles contain no literal src="/ or
    # href="/, so those two rules are no-ops on JS and only affect the HTML.
    location /ohif/ {
        proxy_pass http://ohif_viewer/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable upstream gzip so sub_filter can operate on the raw text
        proxy_set_header Accept-Encoding "";

        # These responses are rewritten on the fly by sub_filter, so the bytes
        # served at a given (hash-named) URL change whenever this config changes.
        # Forbid the browser from reusing a stale cached copy without revalidating
        # — otherwise an app.bundle.js cached during an earlier/broken deploy keeps
        # its old publicPath and requests chunks from "/" (→ 404, blank viewer).
        add_header Cache-Control "no-cache" always;

        sub_filter_types application/javascript;
        sub_filter_once off;
        sub_filter 'src="/'  'src="/ohif/';
        sub_filter 'href="/' 'href="/ohif/';
        sub_filter "window.PUBLIC_URL = '/'" "window.PUBLIC_URL = '/ohif/'";
        sub_filter '__webpack_require__.p = "/"' '__webpack_require__.p = "/ohif/"';
    }

    # OHIF CSS — rewrite the absolute font url(/<hash>.woff2) refs to the /ohif/
    # subpath. This MUST be a CSS-only location: sub_filter is case-insensitive,
    # so applying a 'url(/' rule to the JS bundles (above) also rewrites valid
    # code such as `new URL(/* webpack worker import */ ...)`, which both
    # lowercases URL and mangles the /* */ comment → SyntaxError → blank viewer.
    location ~ ^/ohif/(.+\.css)$ {
        proxy_pass http://ohif_viewer/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Encoding "";
        add_header Cache-Control "no-cache" always;

        sub_filter_types text/css;
        sub_filter_once off;
        sub_filter 'url(/' 'url(/ohif/';
    }

    # Health check
    location /health {
        proxy_pass http://backend_api/health;
    }

    # Orthanc (includes Stone Web Viewer at /stone-webviewer/)
    location /orthanc/ {
        proxy_pass http://orthanc_server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /dicom-web/ {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-API-Key" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://orthanc_server/dicom-web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /wado {
        add_header Access-Control-Allow-Origin $http_origin always;

        proxy_pass http://orthanc_server/wado;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
