name: abdomen_mri
version: "1.0.0"
description: >
  Abdominal MRI organ segmentation and volumetry using TotalSegmentator
  (total_mr): liver, spleen, right kidney, left kidney, and pancreas, with
  per-organ volumes, total parenchymal volume, and hepatomegaly / splenomegaly
  flags. Supports T2 HASTE, T1 in-phase/out-of-phase, DWI, and DCE sequences.
supported_body_parts:
  - ABDOMEN
  - LIVER
  - PANCREAS
  - KIDNEY
required_sequences:
  - T2_HASTE
  - T1_IP
model_type: TotalSegmentator (total_mr)
enabled: true
