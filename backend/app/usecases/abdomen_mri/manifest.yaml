name: abdomen_mri
version: "1.0.0"
description: >
  Abdominal MRI segmentation and organ volumetry. Segments liver, spleen,
  right kidney, left kidney, and pancreas. Computes per-organ volumes,
  total parenchymal volume, and flags hepatomegaly and splenomegaly.
  Supports T2 HASTE, T1 in-phase/out-of-phase, DWI, and DCE sequences.
supported_body_parts:
  - ABDOMEN
  - LIVER
  - PANCREAS
  - KIDNEY
required_sequences:
  - T2_HASTE
  - T1_IP
model_type: segresnet
enabled: true
