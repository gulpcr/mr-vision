name: spine_mri
version: "1.0.0"
description: >
  Spine MRI segmentation and quantitative analysis using TotalSegmentator
  (total_mr): vertebrae, intervertebral discs, spinal canal, and cord, with
  disc counts, canal/cord cross-sectional areas, and stenosis / cord-compression
  flags. When enabled, SpineNet adds exact vertebral-level identification
  (e.g. L4-L5) and per-disc radiological grading (Pfirrmann, herniation). A
  synthetic fallback runs when no weights are available.
supported_body_parts:
  - SPINE
  - CSPINE
  - TSPINE
  - LSPINE
required_sequences:
  - SAG_T2
  - AX_T2
model_type: TotalSegmentator (total_mr) + SpineNet
enabled: true
