model:
  architecture: totalsegmentator_mr
  version: "2.2"  # informational — not passed to Python API
  totalseg_task: total_mr
  totalseg_weights_dir: /model_cache/totalsegmentator
  # Vertebral levels to merge into label 1; all others come from total_mr
  vertebra_prefixes:
    - vertebrae_C
    - vertebrae_T
    - vertebrae_L
    - vertebrae_S
  organ_map:
    spinal_cord: 4

inference:
  device: auto   # selects cuda when GPU is present, cpu otherwise
  mixed_precision: true

preprocessing:
  target_spacing: [0.9, 0.9, 3.0]
  orientation: RAS
  intensity_normalization: z_score
  crop_to_nonzero: true

postprocessing:
  label_map:
    0: background
    1: vertebra
    2: intervertebral_disc
    3: spinal_canal
    4: spinal_cord
  min_structure_volume_ml: 0.1
  apply_connected_components: true
  largest_component_only_labels: [3, 4]

quality_checks:
  min_expected_spacing_mm: 0.3
  max_expected_spacing_mm: 6.0
  min_slices: 15
  max_spacing_anisotropy: 8.0
  motion_artifact_threshold: 0.15

# ── SpineNet (VGG Oxford) — vertebral level labelling + disc grading ──────────
# HYBRID with TotalSegmentator: TotalSegmentator still produces the voxel
# segmentation and volumes (label map / artifacts unchanged); SpineNet adds the
# exact vertebral LEVEL identities (T12, L1–L5, S1) and per-disc radiological
# grading (Pfirrmann, disc narrowing, central-canal / foraminal stenosis,
# spondylolisthesis, endplate defects, Modic marrow changes, herniation).
# SpineNet is run on the SAG_T2 sagittal DICOMs (its native, orientation-checked
# loader). It is fully gated: when disabled, weights are unavailable, no SAG_T2
# is present, or anything fails, the pipeline falls back to the TotalSegmentator-
# derived levels — nothing breaks.
# Submodule: external/spinenet (pip install -e external/spinenet on the worker).
spinenet:
  enabled: true
  scan_type: lumbar          # "lumbar" | "whole" (whole-spine sagittal)
  device: auto               # "auto" | "cuda:0" | "cpu"
  auto_download_weights: true # fetch VGG weights to external/spinenet/.../weights on first run
  require_dcm_extension: false # PACS-exported slices often lack a .dcm suffix

swin_unetr:
  # Set to a .pt file to activate SwinUNETR over TotalSegmentator.
  # Leave null to use TotalSegmentator (default).
  custom_weights_path: null
  in_channels: 1              # single-channel MRI input
  out_channels: 5             # background + 4 spine labels
  feature_size: 48
  use_checkpoint: false
  roi_size: [96, 96, 96]
  sw_batch_size: 1
  overlap: 0.5
  mode: gaussian
  threshold: 0.5
