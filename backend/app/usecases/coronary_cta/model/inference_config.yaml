model:
  architecture: swin_unetr
  # Path to a .pt weights file (SwinUNETR state_dict) for learned coronary lumen
  # segmentation. When null, the pipeline runs in Agatston-only fallback mode (no
  # stenosis grading / CAD-RADS). When set, the pipeline segments the lumen and
  # derives a geometric per-vessel diameter-stenosis estimate + CAD-RADS (see
  # pipeline._run_lumen_segmentation and the `stenosis` block below). Vessels are
  # reported as geometric branches, not SCCT 18-segment anatomical labels.
  custom_ccta_weights_path: null
  # SwinUNETR architecture hyperparameters — must match the trained checkpoint.
  in_channels: 1           # contrast CCTA HU volume (single channel)
  out_channels: 2          # 2 = softmax (background + lumen); 1 = sigmoid binary
  feature_size: 48
  use_checkpoint: false

inference:
  device: auto             # "cuda" | "cpu" | "auto"
  roi_size: [96, 96, 96]
  sw_batch_size: 1
  overlap: 0.5
  mode: gaussian
  dl_lumen_threshold: 0.5

# ── Per-vessel diameter-stenosis grading ──────────────────────────────────────
# Geometric stenosis estimate computed from the learned lumen mask: each
# connected vessel is skeletonised and its local lumen diameter sampled from the
# distance transform; stenosis% = (D_ref - D_min) / D_ref over the diameter
# profile. Active only when a lumen-segmentation model is loaded. Vessels are
# reported as geometric branches, NOT SCCT 18-segment anatomical labels (sets the
# stenosis_segment_labels_approximate QA flag). All thresholds are tunable and
# should be validated on local data.
stenosis:
  min_vessel_volume_mm3: 50.0        # drop tiny noise components before grading
  min_centerline_voxels: 10          # minimum skeleton length to grade a vessel
  min_reference_diameter_mm: 1.5      # ignore sub-coronary-calibre structures
  reference_percentile: 80           # healthy proximal reference diameter (D_ref)
  minimal_percentile: 5              # minimal lumen diameter (D_min)
  endpoint_prune_iterations: 3       # trim tapering skeleton tips (false minima)

# ── Coronary lumen source for stenosis grading ────────────────────────────────
# When no learned SwinUNETR model is configured (model.custom_ccta_weights_path
# is null), derive the coronary lumen from TotalSegmentator's `coronary_arteries`
# task instead — no external weights needed; it uses the same TotalSegmentator
# model cache already relied on by the heart-ROI step. The resulting lumen mask is
# fed to the SAME geometric per-vessel grader (the `stenosis` block above), so the
# output is still a geometric diameter-stenosis estimate, NOT SCCT 18-segment
# anatomy. A learned model (when present) always takes precedence. Falls back to
# Agatston-only on any failure.
coronary_lumen:
  use_totalseg_coronary: true
  totalseg_task: coronary_arteries
  # Some TotalSegmentator versions gate the coronary_arteries task behind a free
  # non-commercial license. Set the license number here (or via the
  # `totalseg_set_license` CLI) to enable it; leave null otherwise. Without a
  # required license the task fails and the pipeline degrades to calcium-only.
  totalseg_license_number: null

# ── Coronary artery calcium (Agatston) scoring ────────────────────────────────
# Agatston is defined on the NON-CONTRAST gated series. HU >= 130 within the
# cardiac ROI is counted; each lesion is weighted 1-4 by peak HU.
calcium_scoring:
  hu_threshold: 130            # standard Agatston detection threshold (HU)
  min_lesion_area_mm2: 1.0     # minimum contiguous in-plane area to count a lesion
  reference_slice_thickness_mm: 3.0   # Agatston reference; score scaled by actual/ref

  # ── Cardiac ROI source ────────────────────────────────────────────────────
  # When true, restrict Agatston HU>=130 detection to a TotalSegmentator `heart`
  # mask (run on the non-contrast calcium CT), dilated by heart_roi_dilate_mm to
  # include the epicardial coronary arteries that sit just outside the cardiac
  # silhouette. This replaces the heuristic bounding box below with an anatomy-
  # aware ROI and removes most non-coronary calcium (sternum/spine/descending
  # aorta) from the score. Falls back to the heuristic box on ANY failure
  # (TotalSegmentator unavailable, weights missing, shape mismatch), preserving
  # the previous behaviour. The Agatston scoring math is unchanged either way.
  use_totalseg_heart_roi: true
  totalseg_task: total          # CT task; provides the `heart` label
  # Epicardial inclusion margin. The TotalSegmentator `heart` label is the
  # cardiac silhouette (chambers + myocardium); the coronary arteries lie on the
  # epicardial surface just outside it, so the mask is dilated outward by this
  # many mm before calcium detection. CLINICALLY TUNABLE — too small drops
  # proximal-vessel calcium, too large re-admits aortic/valvular calcium. The
  # 8 mm default is a conservative starting point and should be validated on
  # local data.
  heart_roi_dilate_mm: 8.0

  # Heuristic central-cardiac ROI (fractions of volume extent). Used only when
  # use_totalseg_heart_roi is false OR the heart-mask step fails. Over/under-
  # counts at the margins (sets the calcium_roi_approximate QA flag).
  roi_x_lo: 0.30
  roi_x_hi: 0.80
  roi_y_lo: 0.25
  roi_y_hi: 0.78
  roi_z_lo: 0.10
  roi_z_hi: 0.90

postprocessing:
  generate_overlay: true
  hu_window_center: 300        # display window for calcium overlay PNGs
  hu_window_width: 1500
  overlay_top_n_slices: 3      # render the N slices with the most calcium

quality_checks:
  min_slices: 30
  # Native (non-contrast) calcium scans are typically acquired at 2.5-3.0 mm.
  # Thin-slice or contrast-enhanced inputs make the Agatston score unreliable.
  max_calcium_slice_thickness_mm: 3.5
