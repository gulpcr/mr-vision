name: coronary_cta
version: "0.1.0"
description: >
  Coronary CT angiography (CCTA) pipeline. Computes the coronary artery calcium
  (Agatston) score from the non-contrast gated series, restricting detection to
  a TotalSegmentator heart-mask ROI (dilated to include the epicardial coronary
  arteries) so non-coronary calcium is excluded; falls back to a heuristic
  cardiac box if the heart mask is unavailable. Per-segment stenosis grading and
  CAD-RADS on the SCCT 18-segment model are planned but NOT yet implemented, so
  the pipeline currently runs Agatston-only.
supported_body_parts:
  - HEART
  - CARDIAC
  - CHEST
  - THORAX
# Two acquisitions matter clinically: the contrast-enhanced CCTA drives lumen /
# stenosis analysis; the non-contrast gated scan is required for a valid
# Agatston score. The pipeline degrades gracefully when only one is present.
required_sequences:
  - CTA
  - CT
model_type: Agatston + TotalSegmentator (heart ROI)
enabled: true
