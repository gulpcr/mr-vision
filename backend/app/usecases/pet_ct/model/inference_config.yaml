model:
  architecture: swin_unetr
  # Path to a .pt weights file for learned PET lesion segmentation.
  # When null, the pipeline falls back to PERCIST 1.0 SUV-threshold detection.
  custom_pet_weights_path: null
  # SwinUNETR architecture hyperparameters — must match the trained checkpoint.
  in_channels: 2           # 2 = [SUV, CT_HU] dual-channel; 1 = SUV only
  out_channels: 2          # 2 = softmax (background + lesion); 1 = sigmoid binary
  feature_size: 48         # SwinUNETR hidden feature size (24/36/48/96)
  use_checkpoint: false    # gradient checkpointing (saves VRAM, slower training)

  # ── AutoPET3 (nnU-Net v2) lesion segmentation ────────────────────────────────
  # The AutoPET3 challenge-winning models are nnU-Net (NOT SwinUNETR), so they
  # load through the nnU-Net predictor — NOT via custom_pet_weights_path above
  # (a SwinUNETR loader). Point custom_pet_nnunet_dir at an nnU-Netv2 trained-
  # model folder (the directory containing dataset.json, plans.json, and
  # fold_*/checkpoint_final.pth). When set AND nnunetv2 is installed it takes
  # precedence over the PERCIST threshold; on ANY failure the pipeline falls back
  # to PERCIST so existing quantification never regresses.
  # IMPORTANT: requires on-site validation — nnunet_channel_order and the spacing
  # orientation must match the specific AutoPET3 export before clinical use.
  custom_pet_nnunet_dir: null
  nnunet_folds: [0]
  nnunet_checkpoint: checkpoint_final.pth
  # AutoPET input convention: channel 0000 = CT, 0001 = PET (SUV).
  nnunet_channel_order: [ct, pet]

  # ── AutoPET3 winning model (Team LesionTracer) — isolated subprocess ─────────
  # The AutoPET3 model is a customised nnU-Net FORK (backend/external/autopet3)
  # with a bespoke `autoPET3_Trainer` + ResEncL plans. Its checkpoint can only be
  # loaded by THAT fork, which conflicts with the pip `nnunetv2` TotalSegmentator
  # uses — so it is run OUT-OF-PROCESS via scripts/run_autopet3_predict.py, which
  # prepends the fork to sys.path. This tier takes precedence over the in-process
  # custom_pet_nnunet_dir tier above; on any failure both fall back to PERCIST.
  #
  # Setup: (1) download the 5-fold checkpoint (Zenodo 14007247) — see
  # scripts/download_autopet3_weights.py — into a MODEL_FOLDER with fold_X subdirs;
  # (2) set model_dir below and enabled: true; (3) for dependency isolation,
  # point python_executable at a venv that has `pip install -e external/autopet3`
  # (leave null to reuse the worker interpreter with the fork on sys.path).
  autopet3:
    enabled: true
    # Download target (Zenodo 14007247 → autoPET-3-LesionTracer.zip, ~3.8 GB).
    # May point at the parent dir; the pipeline auto-descends to the folder that
    # actually contains fold_0 ... fold_4. When the weights are absent the tier
    # is skipped and detection falls back to PERCIST — so enabling is safe.
    model_dir: /model_cache/autopet3
    fork_path: null              # defaults to <backend>/external/autopet3
    python_executable: null      # null → current interpreter; else isolated venv python
    folds: [0, 1, 2, 3, 4]
    checkpoint_name: checkpoint_final.pth
    lesion_label: 1              # output label treated as lesion (autoPET lesion task = 1)
    timeout_sec: 3600

inference:
  device: auto             # "cuda" | "cpu" | "auto" (prefer CUDA if available)
  # Sliding-window inference params (match training roi_size)
  roi_size: [96, 96, 96]
  sw_batch_size: 1
  overlap: 0.5
  mode: gaussian           # "gaussian" | "constant" (window blending)
  # DL output threshold: sigmoid/softmax class-1 probability above this → lesion
  dl_lesion_threshold: 0.5

  # Fallback PERCIST threshold params (used when custom_pet_weights_path is null)
  percist_liver_factor: 1.5
  suv_threshold_absolute: 2.5
  # Detection threshold source for CALIBRATED SUV studies (drives which voxels
  # become "detected lesions" — i.e. the cyan outlines in the fused viewer).
  #   "liver_mean" — case-adaptive: threshold = calibrated_liver_factor * the
  #                  study's own liver SUVmean reference (physiologic background),
  #                  so detection scales with each patient's normal liver uptake.
  #   "absolute"   — fixed suv_threshold_absolute (e.g. SUV 2.5) for every case.
  # Falls back to suv_threshold_absolute when no liver reference is available.
  calibrated_threshold_source: liver_mean   # "liver_mean" | "absolute"
  calibrated_liver_factor: 1.0              # detection threshold = factor * liver SUVmean
  # Tumor-positive/negative call cutoff when calibrated_threshold_source is
  # "liver_mean": a focus is called positive when SUVmax > factor * liver SUVmean.
  # Raise above calibrated_liver_factor to make the positive call stricter than
  # detection (e.g. detect at 1.0x liver, call positive only above 1.5x liver).
  diagnosis_liver_factor: 1.0
  # Reference SUV regions (liver / aortic blood pool) via TotalSegmentator instead
  # of the HU-box heuristic, which averages generic soft tissue and under-reads the
  # liver. Falls back to the heuristic per-organ if segmentation is unavailable.
  reference_organ_segmentation: true
  # When SUV calibration is absent (no patient weight / injected dose in the PET
  # DICOM header), pixel values are RELATIVE-normalised intensities — not true
  # SUV — so the absolute SUV threshold above is meaningless and lights up a
  # large fraction of the body. In that case detection switches to the
  # liver-relative PERCIST threshold and the result is flagged non-quantitative.
  uncalibrated_use_relative_threshold: true
  min_lesion_volume_ml: 1.2
  # Upper sanity bound: a single connected focus larger than max_lesion_volume_ml
  # OR larger than max_lesion_volume_fraction of the whole imaged volume is not a
  # plausible lesion — it means the suppression stages failed to break up diffuse
  # uptake (typical of uncalibrated data with no CT). Such foci are dropped and a
  # QA flag is raised rather than reported as a giant "tumour".
  max_lesion_volume_ml: 2000.0
  max_lesion_volume_fraction: 0.10
  suv_peak_sphere_radius_mm: 6.204

  # ── Physiologic FDG suppression (reduces false positives from normal uptake) ──
  # Anatomy-aware: segments organs on the co-registered CT with TotalSegmentator
  # and excludes their voxels from threshold-based detection. Falls back to the
  # coarse geometric brain/thyroid/bladder mask when CT or TotalSegmentator is
  # unavailable. Only applied to threshold detection — a trained DL model is
  # trusted to discriminate physiologic uptake on its own.
  physiologic_suppression:
    enabled: true
    totalseg_task: total
    totalseg_weights_dir: /model_cache/totalsegmentator
    dilate_voxels: 1
    # Organs whose physiologic / excretory FDG uptake is excluded from detection.
    # Conservative default (high-uptake, low primary-tumour-risk sites). Add
    # liver / spleen / stomach / small_bowel / colon if bowel or hepatic false
    # positives dominate — but note that excluding an organ also hides any true
    # lesion located within it.
    exclude_organs:
      - brain
      - heart
      - urinary_bladder
      - kidney_left
      - kidney_right

  # ── CT concordance: reject foci with no soft-tissue correlate (e.g. bowel gas) ──
  ct_concordance:
    enabled: true
    min_mean_hu: -150.0    # reject a focus whose mean CT HU is air/gas
    air_hu: -200.0
    max_air_fraction: 0.5  # reject if > this fraction of the focus is air voxels

preprocessing:
  # Normalisation applied before DL inference
  clip_suv_max: 20.0       # SUV clipped to [0, clip_suv_max] → divided by clip_suv_max → [0,1]
  clip_ct_min: -1000.0     # HU clip range → (HU - clip_ct_min) / (clip_ct_max - clip_ct_min) → [0,1]
  clip_ct_max: 1000.0

  pet_series_patterns:
    - "(?i)\\bpt\\b"
    - "(?i)\\bpet\\b"
    - "(?i)emission"
    - "(?i)fdg"
    - "(?i)wholebody"
  ct_series_patterns:
    - "(?i)\\bct\\b"
    - "(?i)attenuation"
    - "(?i)transmission"
    - "(?i)low.*dose"
    - "(?i)scout"
  f18_half_life_seconds: 6586.2

postprocessing:
  generate_mip: true
  generate_fused: true
  mip_colormap: hot
  liver_hu_min: 40
  liver_hu_max: 80
  mediastinum_hu_min: 20
  mediastinum_hu_max: 55

quality_checks:
  min_slices: 100
  max_expected_suv: 50.0
  warn_on_missing_calibration: true
