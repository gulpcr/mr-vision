rules:
  - body_parts:
      - BRAIN
      - HEAD
    study_description_patterns:
      - "(?i)brain.*pet"
      - "(?i)pet.*brain"
      - "(?i)fdg.*brain"
      - "(?i)amyloid"
      - "(?i)tau.*pet"
      - "(?i)psma.*brain"
      - "(?i)neuro.*pet"
      - "(?i)dementia.*pet"
      - "(?i)alzheimer"
    # NOTE: no generic PET/SUV/emission series patterns here. A bare "PET" series
    # (e.g. "PET WB") is present on EVERY PET study, so using it as region evidence
    # made whole-body PET/CT mis-route to the brain pipeline. Brain discrimination
    # must come from body_part (BRAIN/HEAD) or a brain-specific study/series name.
    series_description_patterns:
      - "(?i)brain"
      - "(?i)amyloid"
      - "(?i)tau"
    modality: PT
    priority: 20
    enabled: true
