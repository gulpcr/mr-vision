name: pet_ct_brain
version: "1.0.0"
description: >
  Brain PET/CT pipeline for neurology and neuro-oncology. Registers PET to the
  MNI152 template and applies the AAL3 atlas to compute per-region SUVR and an
  asymmetry index; centiloid is derived for amyloid tracers. Supports FDG
  (metabolic mapping), amyloid (Florbetapir / Florbetaben), and tau
  (Flortaucipir) radiotracers. Flags hypometabolism patterns and focal
  hypermetabolism for tumour-recurrence evaluation.
supported_body_parts:
  - BRAIN
  - HEAD
required_sequences:
  - PET
  - CT
model_type: atlas_registration
enabled: true
