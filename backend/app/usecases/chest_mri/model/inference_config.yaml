model:
  architecture: totalsegmentator_mr
  version: "2.2"  # informational — not passed to Python API
  totalseg_task: total_mr
  totalseg_weights_dir: /model_cache/totalsegmentator
  organ_map:
    lung_right: 1
    lung_left: 2
    heart: 3
    aorta: 4

inference:
  device: auto   # selects cuda when GPU is present, cpu otherwise
  mixed_precision: true

preprocessing:
  target_spacing: [1.5, 1.5, 3.0]
  orientation: RAS
  intensity_normalization: z_score
  crop_to_nonzero: true

  # ── MR intensity-inhomogeneity (bias field) correction ──────────────────────
  # MR surface-coil shading biases TotalSegmentator's lung boundary and therefore
  # the left/right lung VOLUMES. A denoising prefilter is applied FIRST (it
  # stabilises the N4 b-spline fit against noise), then N4 bias-field correction,
  # then the existing resample + z-score normalisation. Applied to the input
  # image only — it does not alter the segmentation label logic, and any failure
  # falls back to the uncorrected image so the lung workflow is never broken.
  bias_field_correction:
    enabled: true
    prefilter: curvature_flow      # "curvature_flow" | "median" | "none"
    prefilter_iterations: 5
    prefilter_timestep: 0.0625
    shrink_factor: 4               # downsample for the N4 fit (speed); 1 = full res
    n4_iterations: [50, 50, 50, 50]
    n4_fitting_levels: 4

postprocessing:
  label_map:
    0: background
    1: right_lung
    2: left_lung
    3: heart
    4: aorta
  min_structure_volume_ml: 1.0
  apply_connected_components: true
  largest_component_only_labels: [1, 2, 3, 4]

quality_checks:
  min_expected_spacing_mm: 0.5
  max_expected_spacing_mm: 8.0
  min_slices: 20
  max_spacing_anisotropy: 6.0
  motion_artifact_threshold: 0.15

swin_unetr:
  # Set to a .pt file to activate SwinUNETR over TotalSegmentator.
  # Leave null to use TotalSegmentator (default).
  custom_weights_path: null
  in_channels: 1              # single-channel MRI input
  out_channels: 5             # background + 4 chest labels
  feature_size: 48
  use_checkpoint: false
  roi_size: [96, 96, 96]
  sw_batch_size: 1
  overlap: 0.5
  mode: gaussian
  threshold: 0.5

# ── (Problem B) Supplementary cardiac model ───────────────────────────────────
# Optional dedicated cardiac segmentation that OVERRIDES only the heart label
# (3) in the final map, leaving the TotalSegmentator lung/aorta segmentation
# untouched (so the lung volume workflow is unaffected). Inert while
# custom_weights_path is null — the whole-heart TotalSegmentator label is then
# used as before. Provide a SwinUNETR .pt (e.g. an nnU-Net-derived cardiac model
# exported to a state_dict) to activate.
cardiac_model:
  custom_weights_path: null
  in_channels: 1
  out_channels: 2             # background + heart
  feature_size: 48
  use_checkpoint: false
  roi_size: [96, 96, 96]
  sw_batch_size: 1
  overlap: 0.5
  mode: gaussian

# ── (Problem C) Dedicated lesion detection ────────────────────────────────────
# Optional, strictly modular lesion-detection model. Inert while
# custom_weights_path is null: the pipeline then performs ONLY lung-volume
# asymmetry screening (reported as lung_volume_asymmetry, NOT as a detected
# lesion). When weights are supplied, a binary lesion mask is produced and
# lesion_detected reflects the model output, with a lesion_mask.nii.gz artifact.
lesion_detection:
  custom_weights_path: null
  in_channels: 1
  out_channels: 2             # background + lesion
  feature_size: 48
  use_checkpoint: false
  roi_size: [96, 96, 96]
  sw_batch_size: 1
  overlap: 0.5
  mode: gaussian
  threshold: 0.5
  min_lesion_volume_ml: 0.5
