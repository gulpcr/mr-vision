services:
  # ========== Infrastructure ==========
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mri_platform}
      POSTGRES_USER: ${POSTGRES_USER:-mri_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mri_admin} -d ${POSTGRES_DB:-mri_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-mri_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # ========== DICOM / PACS ==========
  orthanc:
    build: ./orthanc
    ports:
      - "4242:4242"
      - "8042:8042"
    volumes:
      - orthanc_data:/var/lib/orthanc/db
    depends_on:
      - postgres

  # ========== Backend API (CPU — no GPU needed) ==========
  backend:
    build:
      context: ./backend
      target: api
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mri_admin}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-mri_platform}
    volumes:
      - ./backend:/app
    command: >
      bash -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --reload
      "
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  # ========== Celery Worker (GPU-accelerated) ==========
  worker:
    build:
      context: ./backend
      target: worker
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mri_admin}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-mri_platform}
      - CUDA_VISIBLE_DEVICES=0,1
      - TOTALSEG_WEIGHTS_PATH=/model_cache/totalsegmentator
      - MONAI_HOME=/model_cache/monai
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./backend:/app
      - model_bundles:/app/app/usecases/brain_mri/model/bundles
      - model_cache:/model_cache
    command: >
      celery -A app.infrastructure.queue.celery_app:celery_app worker
      --loglevel=info --concurrency=2 -Q mri_inference
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      backend:
        condition: service_started

  # ========== Celery Beat Scheduler (F15 Retention) ==========
  beat:
    build:
      context: ./backend
      target: api
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mri_admin}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-mri_platform}
    volumes:
      - ./backend:/app
    command: >
      celery -A app.infrastructure.queue.celery_app:celery_app beat
      --loglevel=info --schedule=/tmp/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ========== OHIF Viewer (F17) ==========
  ohif:
    image: ohif/app:latest
    ports:
      - "3001:80"
    environment:
      - APP_CONFIG=/usr/share/nginx/html/app-config.js
    volumes:
      - ./ohif/app-config.js:/usr/share/nginx/html/app-config.js:ro
    depends_on:
      - orthanc

  # ========== Frontend UI ==========
  ui:
    build: ./ui
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_DICOMWEB_URL=http://localhost/dicom-web
    depends_on:
      - backend

  # ========== Reverse Proxy ==========
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - ui
      - orthanc

volumes:
  postgres_data:
  redis_data:
  minio_data:
  orthanc_data:
  model_bundles:
  model_cache:
